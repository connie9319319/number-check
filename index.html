  <script>
    const ENERGY_MAP = {

      "93":"生氣","39":"生氣","82":"生氣","28":"生氣",

      "19":"延年","91":"延年","87":"延年","78":"延年",
      "34":"延年","43":"延年","26":"延年","62":"延年",

      "11":"伏位","22":"伏位","33":"伏位","44":"伏位",
      "66":"伏位","77":"伏位","88":"伏位","99":"伏位",

      "12":"絕命","21":"絕命","69":"絕命","96":"絕命",
      "48":"絕命","84":"絕命","73":"絕命","37":"絕命",

      "17":"禍害","71":"禍害","89":"禍害","98":"禍害",

      "38":"六煞","83":"六煞","92":"六煞","29":"六煞",

      "18":"五鬼","81":"五鬼","79":"五鬼","97":"五鬼",
      "42":"五鬼","24":"五鬼","36":"五鬼","63":"五鬼"
    };

    const CATEGORY = {
      "天醫":"四吉數",
      "生氣":"四吉數",
      "延年":"四吉數",
      "伏位":"四吉數",
      "六煞":"四凶數",
      "絕命":"四凶數",
      "禍害":"四凶數",
      "五鬼":"四凶數"
    };

    const RAW_SCORE = {
      "天醫": 500,
      "生氣": 500,
      "延年": 500,
      "伏位": 500,
      "六煞": -500,
      "絕命": -500,
      "禍害": -500,
      "五鬼": -1500
    };

    function preprocessPhone(phone) {
      // 1. 去除非數字
      let digits = phone.replace(/\D/g, "");

      // 2. 驗證台灣手機號碼
      if (!/^09\d{8}$/.test(digits)) {
        throw new Error("請輸入正確的台灣手機號碼，例如 0938019423。");
      }

      // 3. 第一個共同數 0 不參考
      let number = digits.slice(1);

      // 4. 5 在前後視為 0；中間的 5 刪除
      const chars = [...number];
      const processed = chars
        .map((char, index) => {
          if (char !== "5") return char;
          const isFirst = index === 0;
          const isLast = index === chars.length - 1;
          return (isFirst || isLast) ? "0" : "";
        })
        .join("");

      if (processed.length < 2) {
        throw new Error("處理後的有效數字不足，無法進行健檢。");
      }

      return { original: digits, processed };
    }

    function getOriginalEnergy(pair) {
      // 只要組合含 0，原始能量即為伏位
      if (pair.includes("0")) return "伏位";
      return ENERGY_MAP[pair] || null;
    }

    function analyzePhone(phone) {
      const { original, processed } = preprocessPhone(phone);
      const results = [];
      let previousFinalEnergy = "";

      for (let i = 0; i < processed.length - 1; i++) {
        const pair = processed[i] + processed[i + 1];
        const originalEnergy = getOriginalEnergy(pair);

        if (!originalEnergy) {
          throw new Error(`數字組合 ${pair} 尚未設定對應能量。`);
        }

        let finalEnergy = originalEnergy;

        // 伏位為變色龍：若前面已有最終能量，就直接承接
        if (originalEnergy === "伏位" && previousFinalEnergy) {
          finalEnergy = previousFinalEnergy;
        }

        results.push({
          pair,
          energy: finalEnergy,
          category: CATEGORY[finalEnergy],
          rawScore: RAW_SCORE[finalEnergy]
        });

        previousFinalEnergy = finalEnergy;
      }

      const rawTotal = results.reduce((sum, item) => sum + item.rawScore, 0);

      /*
        100 分制：
        以 50 分為中線。
        每一組 +500 或 -500，依總組數等比例換算；
        五鬼 -1500，因此影響是一般凶數的 3 倍。
      */
      const score = Math.max(
        0,
        Math.min(
          100,
          Math.round(50 + (rawTotal / (results.length * 1000)) * 100)
        )
      );

      const goodCount = results.filter(item => item.category === "四吉數").length;
      const badCount = results.length - goodCount;

      return { original, processed, results, rawTotal, score, goodCount, badCount };
    }

    function pick(arr, seed) {
      return arr[Math.abs(seed) % arr.length];
    }

    function createTeacherComment(results, phone) {
      const present = new Set(results.map(item => item.energy));
      const negativePriority = ["五鬼", "絕命", "禍害", "六煞"];
      const positivePriority = ["天醫", "生氣", "延年"];
      const seed = Number(phone.slice(-6)) || results.length;

      const selected = [];
      for (const energy of negativePriority) {
        if (present.has(energy)) {
          selected.push(pick(COMMENT_BANK[energy], seed + energy.length));
          break;
        }
      }
      for (const energy of positivePriority) {
        if (present.has(energy)) {
          selected.push(pick(COMMENT_BANK[energy], seed + energy.charCodeAt(0)));
          break;
        }
      }

      if (selected.length === 0) {
        return "門號能量較平穩，仍建議結合個人數字做完整判讀。";
      }

      let text = selected.join("；");
      if (!/[。！？]$/.test(text)) text += "。";
      return text;
    }

    function getLevel(score, results) {
      const badCount = results.filter(
        item => item.category === "四凶數"
      ).length;

      const hasFiveGhosts = results.some(
        item => item.energy === "五鬼"
      );

      // 只要出現五鬼，最低就是「需留意」；
      // 若分數低於 40，則為「豬隊友」。
      if (hasFiveGhosts) {
        if (score < 40) return { stars: 1, text: "豬隊友" };
        return { stars: 2, text: "需留意" };
      }

      // 四凶數達兩組以上，最高只能判定為「需留意」。
      if (badCount >= 2) {
        if (score < 40) return { stars: 1, text: "豬隊友" };
        return { stars: 2, text: "需留意" };
      }

      // 其餘門號依能量分數判斷。
      if (score >= 90) return { stars: 5, text: "神隊友" };
      if (score >= 75) return { stars: 4, text: "好隊友" };
      if (score >= 40) return { stars: 2, text: "需留意" };
      return { stars: 1, text: "豬隊友" };
    }

    function renderResult(data) {
      const energyList = document.getElementById("energyList");
      energyList.innerHTML = "";

      data.results.forEach(item => {
        const row = document.createElement("div");
        row.className = "energy-row";

        const pair = document.createElement("div");
        pair.className = "pair";
        pair.textContent = item.pair;

        const name = document.createElement("div");
        name.className = "energy-name";
        name.textContent = item.energy;

        const badge = document.createElement("div");
        const isGood = item.category === "四吉數";
        badge.className = `badge ${isGood ? "good" : "bad"}`;
        badge.textContent = item.category;

        row.append(pair, name, badge);
        energyList.appendChild(row);
      });

      const level = getLevel(data.score, data.results);
      document.getElementById("scoreValue").textContent = data.score;
      document.getElementById("stars").textContent =
        "★".repeat(level.stars) + "☆".repeat(5 - level.stars);
      document.getElementById("level").textContent = level.text;
      document.getElementById("goodCount").textContent = `${data.goodCount} 組`;
      document.getElementById("badCount").textContent = `${data.badCount} 組`;
      document.getElementById("teacherComment").textContent = createTeacherComment(data.results, data.original);
      document.getElementById("result").style.display = "block";

      document.getElementById("result").scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function runCheck() {
      const input = document.getElementById("phoneInput");
      const error = document.getElementById("errorMessage");
      const result = document.getElementById("result");

      error.textContent = "";
      result.style.display = "none";

      try {
        const data = analyzePhone(input.value);
        renderResult(data);
      } catch (err) {
        error.textContent = err.message;
      }
    }

    document.getElementById("checkButton").addEventListener("click", runCheck);
    document.getElementById("phoneInput").addEventListener("keydown", event => {
      if (event.key === "Enter") runCheck();
    });
  </script>
</body>
</html>
