<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文名字能量推薦系統｜紫晴老師</title>

<style>

body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#f8f6f4;
    margin:0;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#5c4a72;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    margin-top:25px;
}

label{
    display:block;
    margin-top:18px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    margin-top:25px;
    width:100%;
    background:#6b4ca5;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#573d88;
}

.result{
    margin-top:30px;
    background:#fff;
    border-radius:15px;
    padding:20px;
    min-height:150px;
}

</style>

</head>

<body>

<div class="container">

<h1>英文名字數字易經推薦系統</h1>

<div class="card">

<label>客戶姓名</label>
<input id="customer">

<label>性別</label>
<select id="gender">
<option>女</option>
<option>男</option>
</select>

<label>年齡</label>
<input id="age">

<label>職業</label>
<select id="job">

<option>企業主／創業者</option>
<option>公司主管</option>
<option>房仲</option>
<option>金融保險</option>
<option>講師／顧問</option>
<option>業務</option>
<option>服務業</option>
<option>行政</option>
<option>自由工作者</option>
<option>其他</option>

</select>

<label>第一祝福</label>

<select id="wish1">
<option>財富</option>
<option>事業</option>
<option>貴人</option>
<option>家庭</option>
<option>感情</option>
<option>健康</option>
</select>

<label>第二祝福</label>

<select id="wish2">
<option>事業</option>
<option>財富</option>
<option>貴人</option>
<option>家庭</option>
<option>感情</option>
<option>健康</option>
</select>

<label>第三祝福</label>

<select id="wish3">
<option>貴人</option>
<option>財富</option>
<option>事業</option>
<option>家庭</option>
<option>感情</option>
<option>健康</option>
</select>

<button onclick="recommend()">
開始推薦英文名字
</button>

</div>

<div class="result" id="result">

等待輸入客戶資料...

</div>

</div>

<script>

function recommend(){

document.getElementById("result").innerHTML=

`
<h2>正在搜尋資料庫...</h2>

<p>未來這裡會自動：</p>

<ul>

<li>讀取 Google Sheets 名字資料庫</li>

<li>媒合符合條件的英文名字</li>

<li>排序前20名</li>

<li>顯示推薦原因</li>

<li>顯示紫晴老師小語</li>

</ul>

`;

}

</script>

</body>
</html>
