<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文名字數字易經推薦系統｜紫晴老師</title>
<style>
:root{
  --purple-dark:#51456f; --purple:#74658f; --purple-light:#eee9f4;
  --cream:#fbf9f5; --white:#fff; --text:#342f38; --muted:#756f79;
  --line:#e7dfd4; --gold:#b79b6c; --bad:#a85151;
  --shadow:0 14px 36px rgba(61,48,81,.10);
}
*{box-sizing:border-box}
body{
  margin:0; color:var(--text); background:
  radial-gradient(circle at 8% 8%,rgba(183,155,108,.08),transparent 26%),
  radial-gradient(circle at 92% 20%,rgba(116,101,143,.08),transparent 30%),
  var(--cream);
  font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
}
.container{width:min(1080px,calc(100% - 28px));margin:auto}
header{padding:42px 0 24px;text-align:center}
header h1{margin:0;color:var(--purple-dark);font-size:clamp(30px,5vw,48px)}
header p{color:var(--muted);margin:10px 0 0}
.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
label{display:block;font-weight:800;color:var(--purple-dark);margin-bottom:7px}
input,select{
  width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;
  background:#fff;font-size:16px;color:var(--text)
}
button{
  border:0;border-radius:999px;padding:13px 20px;font-size:16px;font-weight:800;
  cursor:pointer
}
.primary{background:linear-gradient(135deg,var(--purple),var(--purple-dark));color:#fff}
.secondary{background:#fff;color:var(--purple-dark);border:1px solid var(--line)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.status{padding:13px 15px;border-radius:12px;background:var(--purple-light);color:var(--purple-dark);margin-top:15px}
.results{display:grid;gap:14px}
.result{
  border:1px solid var(--line);border-radius:18px;padding:18px;background:#fff
}
.result-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.rank{font-size:13px;color:var(--muted)}
.name{font-size:25px;color:var(--purple-dark);font-weight:900}
.score{font-size:22px;font-weight:900;color:var(--purple-dark);white-space:nowrap}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.tag{padding:4px 9px;border-radius:999px;background:var(--purple-light);color:var(--purple-dark);font-size:13px;font-weight:700}
details{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
summary{cursor:pointer;color:var(--purple-dark);font-weight:800}
.analysis{margin-top:12px;line-height:1.8}
.teacher{margin-top:12px;padding:13px 15px;border-left:4px solid var(--gold);background:#faf7f1;border-radius:0 12px 12px 0}
.warn{color:var(--bad);font-weight:800}
.manual-row{display:grid;grid-template-columns:1fr auto;gap:10px}
.small{font-size:13px;color:var(--muted)}
.hidden{display:none}
@media(max-width:720px){.grid{grid-template-columns:1fr}.manual-row{grid-template-columns:1fr}.result-top{display:block}.score{margin-top:5px}}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>英文名字數字易經推薦系統</h1>
  <p>內部顧問工具｜自動媒合前 20 名，最後由紫晴老師人工確認</p>
</header>

<section class="card">
  <div class="grid">
    <div><label>客戶姓名／代號</label><input id="customer" placeholder="例如：林小姐"></div>
    <div><label>性別／名字風格</label>
      <select id="gender"><option value="">不限</option><option value="女">女</option><option value="男">男</option><option value="中性">中性</option></select>
    </div>
    <div><label>年齡</label><input id="age" type="number" min="1" max="120" placeholder="例如：42"></div>
    <div><label>職業別</label>
      <select id="job">
        <option value="">請選擇</option><option>企業主／創業者</option><option>公司主管／管理職</option>
        <option>業務／銷售</option><option>房仲／不動產</option><option>金融／保險</option>
        <option>醫療／健康產業</option><option>美容／美業</option><option>教育／講師／顧問</option>
        <option>行銷／企劃／品牌</option><option>服務業</option><option>自由工作者</option>
        <option>藝術／設計／創作者</option><option>公務人員</option><option>行政／內勤</option>
        <option>專業技術人員</option><option>家庭照顧者</option><option>學生</option><option>退休</option><option>其他</option>
      </select>
    </div>
    <div><label>第一祝福</label><select id="wish1"></select></div>
    <div><label>第二祝福</label><select id="wish2"></select></div>
    <div><label>第三祝福</label><select id="wish3"></select></div>
  </div>
  <div class="actions"><button class="primary" id="recommendBtn">開始推薦前 20 名</button></div>
  <div class="status" id="status">正在準備讀取 Google Sheets 名字資料庫……</div>
</section>

<section class="card">
  <h2>推薦結果</h2>
  <div id="results" class="results"><p class="small">請先輸入客戶條件，再按「開始推薦前 20 名」。</p></div>
</section>

<section class="card">
  <h2>手動試算英文名字</h2>
  <p class="small">資料庫推薦不滿意時，可自行輸入新名字立即分析。</p>
  <div class="manual-row">
    <input id="manualName" placeholder="例如：Olivia">
    <button class="primary" id="manualBtn">立即分析</button>
  </div>
  <div id="manualResult" class="results" style="margin-top:14px"></div>
</section>
</div>

<script>
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeHg_Ey4QRO4UFj2HSp_xWK3OEdXoHmNQF3vBUiCShQgAb99TTOH5f5A89pAX_kRnOsozr0raurcPV/pub?output=csv";
const FORBIDDEN_INITIALS = new Set(["L","P","Q","R","U","W","X"]);
const WISHES = ["財富","事業","貴人","家庭","感情","健康","人氣／人脈","穩定","行動力","自信"];

const ENERGY = {
  "13":"天醫","31":"天醫","68":"天醫","86":"天醫","49":"天醫","94":"天醫","27":"天醫","72":"天醫",
  "14":"生氣","41":"生氣","67":"生氣","76":"生氣","39":"生氣","93":"生氣","28":"生氣","82":"生氣",
  "19":"延年","91":"延年","78":"延年","87":"延年","34":"延年","43":"延年","26":"延年","62":"延年",
  "11":"伏位","22":"伏位","33":"伏位","44":"伏位","66":"伏位","77":"伏位","88":"伏位","99":"伏位",
  "10":"伏位","20":"伏位","30":"伏位","40":"伏位","60":"伏位","70":"伏位","80":"伏位","90":"伏位","00":"伏位",
  "12":"絕命","21":"絕命","69":"絕命","96":"絕命","48":"絕命","84":"絕命","37":"絕命","73":"絕命",
  "18":"五鬼","81":"五鬼","79":"五鬼","97":"五鬼","36":"五鬼","63":"五鬼","24":"五鬼","42":"五鬼",
  "17":"禍害","71":"禍害","89":"禍害","98":"禍害","46":"禍害","64":"禍害","23":"禍害","32":"禍害",
  "16":"六煞","61":"六煞","47":"六煞","74":"六煞","38":"六煞","83":"六煞","29":"六煞","92":"六煞"
};
const BAD = new Set(["絕命","五鬼","禍害","六煞"]);

const ENERGY_TAGS = {
  "天醫":["財富","健康","成果","資源"],
  "生氣":["貴人","人氣／人脈","事業","機會"],
  "延年":["事業","行動力","穩定","自信"],
  "伏位":["穩定","家庭","耐心"],
  "六煞":["感情","人氣／人脈"],
  "禍害":["溝通"],
  "絕命":["行動力"],
  "五鬼":["創意","變動"]
};

let database = [];

function fillWishes(){
  ["wish1","wish2","wish3"].forEach((id,idx)=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">請選擇</option>'+WISHES.map(w=>`<option>${w}</option>`).join("");
    if(idx===0) s.value="財富";
    if(idx===1) s.value="事業";
    if(idx===2) s.value="貴人";
  });
}

function parseCSV(text){
  const rows=[]; let row=[],cell="",quoted=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"' && quoted && n==='"'){cell+='"';i++;}
    else if(c==='"'){quoted=!quoted;}
    else if(c===',' && !quoted){row.push(cell.trim());cell="";}
    else if((c==='\n'||c==='\r')&&!quoted){
      if(c==='\r'&&n==='\n')i++;
      row.push(cell.trim());cell="";
      if(row.some(v=>v!==""))rows.push(row); row=[];
    } else cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());if(row.some(v=>v!==""))rows.push(row);}
  return rows;
}

async function loadDatabase(){
  const status=document.getElementById("status");
  try{
    const res=await fetch(SHEET_CSV_URL,{cache:"no-store"});
    if(!res.ok) throw new Error("無法讀取試算表");
    const rows=parseCSV(await res.text());
    database=rows.map((r,i)=>({
      name:(r[0]||"").trim(),
      gender:(r[1]||"").trim()
    })).filter(x=>/^[A-Za-z][A-Za-z .'-]*$/.test(x.name));
    const first=(database[0]?.name||"").toLowerCase();
    if(["name","英文名字","英文名"].includes(first)) database.shift();
    status.textContent=`已成功讀取 ${database.length} 個英文名字。Google Sheets 更新後，重新整理本頁即可同步。`;
  }catch(e){
    status.innerHTML=`<span class="warn">讀取資料庫失敗：</span>${e.message}。請確認試算表已發布到網路。`;
  }
}

function encodeName(name){
  return [...name.toUpperCase()].filter(c=>/[A-Z]/.test(c)).map(c=>c.charCodeAt(0)-64).join("");
}

function handleFive(raw){
  if(!raw) return "";
  const lastIsFive=raw.endsWith("5");
  const body=lastIsFive?raw.slice(0,-1):raw;
  return body.replaceAll("5","")+(lastIsFive?"0":"");
}

function analyzeName(name){
  const clean=name.trim();
  const raw=encodeName(clean);
  const processed=handleFive(raw);
  const pairs=[]; let previousClear=null;
  for(let i=0;i<processed.length-1;i++){
    const pair=processed.slice(i,i+2);
    let energy=ENERGY[pair]||"未定義";
    let display=energy;
    if(energy==="伏位" && previousClear){
      display=`伏位轉${previousClear}`;
      energy=previousClear;
    }else if(energy!=="伏位" && energy!=="未定義"){
      previousClear=energy;
    }
    pairs.push({pair,base:ENERGY[pair]||"未定義",energy,display});
  }
  const bad=pairs.filter(p=>BAD.has(p.energy)||BAD.has(p.base));
  const counts={}; pairs.forEach(p=>counts[p.energy]=(counts[p.energy]||0)+1);
  const tags={};
  pairs.forEach(p=>(ENERGY_TAGS[p.energy]||[]).forEach(t=>tags[t]=(tags[t]||0)+1));
  return {name:clean,raw,processed,pairs,bad,counts,tags,initial:clean[0]?.toUpperCase()||""};
}

function jobBonuses(job){
  const map={
    "企業主／創業者":["財富","事業","貴人","行動力","穩定"],
    "公司主管／管理職":["事業","穩定","貴人","財富"],
    "業務／銷售":["人氣／人脈","貴人","行動力","財富"],
    "房仲／不動產":["財富","人氣／人脈","貴人","事業"],
    "金融／保險":["財富","事業","穩定","貴人"],
    "美容／美業":["人氣／人脈","財富","貴人","感情"],
    "教育／講師／顧問":["貴人","人氣／人脈","事業","財富"],
    "行銷／企劃／品牌":["人氣／人脈","創意","事業","貴人"],
    "服務業":["人氣／人脈","貴人","財富","穩定"],
    "家庭照顧者":["家庭","健康","感情","穩定"],
    "學生":["貴人","自信","行動力","穩定"],
    "退休":["健康","家庭","穩定","貴人"]
  };
  return map[job]||[];
}

function scoreAnalysis(a,gender,job,wishes){
  if(FORBIDDEN_INITIALS.has(a.initial)) return -9999;
  if(a.bad.length) return -9999;
  let score=50;
  const weights=[22,14,9];
  wishes.forEach((w,i)=>{if(w) score+=(a.tags[w]||0)*weights[i];});
  jobBonuses(job).forEach(t=>score+=(a.tags[t]||0)*3);
  score+=(a.counts["天醫"]||0)*3+(a.counts["生氣"]||0)*3+(a.counts["延年"]||0)*2+(a.counts["伏位"]||0);
  return Math.min(100,Math.round(score));
}

function teacherMessage(a,job,wishes){
  const top=Object.entries(a.counts).sort((x,y)=>y[1]-x[1]).slice(0,2).map(x=>x[0]);
  const wishText=wishes.filter(Boolean).join("、")||"整體順勢";
  const energyText=top.join("與")||"多元";
  let benefit=[];
  top.forEach(e=>benefit.push(...(ENERGY_TAGS[e]||[])));
  benefit=[...new Set(benefit)].slice(0,4);
  return `${a.name} 以${energyText}能量為主，帶有${benefit.join("、")||"穩定成長"}的祝福方向。以目前「${job||"個人發展"}」及希望加強的「${wishText}」來看，可列入候選名單；最後仍建議結合個人命格與流年，由紫晴老師人工確認。`;
}

function resultCard(a,score,rank,wishes,job){
  const energies=a.pairs.map(p=>`${p.pair}｜${p.display}`).join("<br>");
  const final=a.pairs.map(p=>p.energy).join("／");
  const tags=Object.entries(a.tags).sort((x,y)=>y[1]-x[1]).slice(0,5).map(x=>`<span class="tag">${x[0]}</span>`).join("");
  return `<article class="result">
    <div class="result-top"><div><div class="rank">第 ${rank} 名</div><div class="name">${a.name}</div></div><div class="score">${score} 分</div></div>
    <div class="tags">${tags}</div>
    <div class="teacher"><strong>紫晴老師小語</strong><br>${teacherMessage(a,job,wishes)}</div>
    <details><summary>查看完整分析</summary><div class="analysis">
      <strong>原始編碼：</strong>${a.raw}<br>
      <strong>處理後數字：</strong>${a.processed}<br>
      <strong>能量拆解：</strong><br>${energies||"無法拆解"}<br>
      <strong>最終能量：</strong>${final||"無"}<br>
      <strong>顧問提醒：</strong>${FORBIDDEN_INITIALS.has(a.initial)?"首字母不符合規則。":"未出現首字母限制。"}
    </div></details>
  </article>`;
}

function recommend(){
  if(!database.length){document.getElementById("results").innerHTML='<p class="warn">資料庫尚未載入，請稍後重新整理。</p>';return;}
  const gender=document.getElementById("gender").value;
  const job=document.getElementById("job").value;
  const wishes=["wish1","wish2","wish3"].map(id=>document.getElementById(id).value);
  const unique=[...new Map(database.map(x=>[x.name.toLowerCase(),x])).values()];
  const ranked=unique
    .filter(x=>!gender||!x.gender||x.gender===gender||x.gender==="中性"||x.gender.toLowerCase()==="unisex")
    .map(x=>({data:x,a:analyzeName(x.name)}))
    .map(x=>({...x,score:scoreAnalysis(x.a,gender,job,wishes)}))
    .filter(x=>x.score>=0)
    .sort((a,b)=>b.score-a.score||a.a.name.localeCompare(b.a.name))
    .slice(0,20);
  document.getElementById("results").innerHTML=ranked.length
    ?ranked.map((x,i)=>resultCard(x.a,x.score,i+1,wishes,job)).join("")
    :'<p class="warn">目前沒有符合條件且未出現凶數的名字。</p>';
}

function manualAnalyze(){
  const name=document.getElementById("manualName").value.trim();
  if(!name){document.getElementById("manualResult").innerHTML='<p class="warn">請先輸入英文名字。</p>';return;}
  if(!/^[A-Za-z][A-Za-z .'-]*$/.test(name)){document.getElementById("manualResult").innerHTML='<p class="warn">請輸入英文字母名字。</p>';return;}
  const a=analyzeName(name);
  const job=document.getElementById("job").value;
  const wishes=["wish1","wish2","wish3"].map(id=>document.getElementById(id).value);
  const score=scoreAnalysis(a,"",job,wishes);
  let warning="";
  if(FORBIDDEN_INITIALS.has(a.initial)) warning=`<p class="warn">首字母 ${a.initial} 屬限制字母：L、P、Q、R、U、W、X，不列入推薦。</p>`;
  else if(a.bad.length) warning=`<p class="warn">出現凶數能量：${[...new Set(a.bad.map(x=>x.base))].join("、")}，不列入自動推薦，請人工確認。</p>`;
  document.getElementById("manualResult").innerHTML=warning+resultCard(a,Math.max(0,score),1,wishes,job);
}

fillWishes();
loadDatabase();
document.getElementById("recommendBtn").addEventListener("click",recommend);
document.getElementById("manualBtn").addEventListener("click",manualAnalyze);
</script>
</body>
</html>
